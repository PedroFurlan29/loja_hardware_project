spring:
  datasource:
    hikari:
      initialization-fail-timeout: 30000
    url: jdbc:postgresql://localhost:5432/hardware_store_test
    username: test
    password: test
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  liquibase:
    enabled: false

jwt:
  secret: \${JWT_SECRET:test-secret-key-change-me-in-production}
  expiration: 86400000

server:
  port: 0
