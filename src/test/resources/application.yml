spring:  
  datasource:  
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL  
    driver-class-name: org.h2.Driver  
    username: sa  
    password:  
  jpa:  
    hibernate:  
      ddl-auto: create-drop  
    database-platform: org.hibernate.dialect.H2Dialect  
  liquibase:  
    enabled: false  
  
jwt:  
  secret: test-secret-key-for-ci-tests-only-not-production  
  expiration: 86400000  
  
server:  
  port: 0  
