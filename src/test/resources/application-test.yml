spring:
      datasource:
        url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
        driver-class-name: org.h2.Driver
        username: sa
        password:
      jpa:
        hibernate:
          ddl-auto: create-drop
        database-platform: org.hibernate.dialect.H2Dialect

    jwt:
      secret: test-secret-key-for-ci-tests-only-not-prod
      expiration: 86400000

    logging:
      level:
        root: WARN
        com.lojahardware: DEBUG