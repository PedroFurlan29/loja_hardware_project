              - column:
                  name: produto_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_itens_venda_produtos
                    references: produtos(id)
              - column:
                  name: quantidade
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: preco_unitario
                  type: NUMERIC(10,2)
                  constraints:
                    nullable: false

  - changeSet:
      id: 001-create-estoque-table
      author: felipe
      changes:
        - createTable:
            tableName: estoque
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: produto_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    unique: true
                    foreignKeyName: fk_estoque_produtos
                    references: produtos(id)
              - column:
                  name: quantidade
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: estoque_minimo
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
              - column:
                  name: deleted_at
                  type: TIMESTAMP
              - column:
                  name: ativo
                  type: BOOLEAN
                  defaultValue: true
                  constraints:
                    nullable: false
              - column:
                  name: version
                  type: BIGINT
                  defaultValue: 0
