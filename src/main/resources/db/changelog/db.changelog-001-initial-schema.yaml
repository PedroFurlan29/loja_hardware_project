            baseTableSchemaName: public
            baseColumnNames: id

  - changeSet:
      id: 001-create-vendas-table
      author: felipe
      changes:
        - createTable:
            tableName: vendas
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: usuario_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_vendas_usuarios
                    references: usuarios(id)
              - column:
                  name: status
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: valor_total
                  type: NUMERIC(10,2)
                  constraints:
                    nullable: false
              - column:
                  name: motivo_cancelamento
                  type: VARCHAR(255)
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
              - column:
                  name: deleted_at
                  type: TIMESTAMP
              - column:
                  name: ativo
                  type: BOOLEAN
                  defaultValue: true
                  constraints:
                    nullable: false
              - column:
                  name: version
                  type: BIGINT
                  defaultValue: 0

  - changeSet:
      id: 001-create-itens_venda-table
      author: felipe
      changes:
        - createTable:
            tableName: itens_venda
            columns:
              - column:
                  name: id
