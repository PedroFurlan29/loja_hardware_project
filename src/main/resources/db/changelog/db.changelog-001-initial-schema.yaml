                  constraints:
                    nullable: false
              - column:
                  name: modelo
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: vram_gb
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: tipo_memoria
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: chipset
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: largura_banda_bits
                  type: INT
                  constraints:
                    nullable: false
            foreignKeyName: fk_placas_de_video_produtos
            referencedTableName: produtos
            referencedColumnNames: id
            baseTableSchemaName: public
            baseColumnNames: id

  - changeSet:
      id: 001-create-memorias-table
      author: felipe
      changes:
        - createTable:
            tableName: memorias
