  - changeSet:
      id: 001-create-dispositivos_armazenamento-table
      author: felipe
      changes:
        - createTable:
            tableName: dispositivos_armazenamento
            columns:
              - column:
                  name: id
                  type: BIGINT
                  constraints:
                    primaryKey: true
              - column:
                  name: marca
