                  constraints:
                    nullable: false
              - column:
                  name: modelo
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: capacidade_gb
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: tipo_armazenamento
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: interface_
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: velocidade_leitura_mbs
                  type: INT
                  constraints:
