              - column:
                  name: nome
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: cnpj
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: email
                  type: VARCHAR(100)
              - column:
                  name: telefone
                  type: VARCHAR(20)
              - column:
                  name: endereco
                  type: VARCHAR(255)
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
              - column:
                  name: deleted_at
                  type: TIMESTAMP
              - column:
                  name: ativo
                  type: BOOLEAN
                  defaultValue: true
                  constraints:
                    nullable: false
              - column:
                  name: version
                  type: BIGINT
                  defaultValue: 0

  - changeSet:
      id: 001-create-produtos-table
      author: felipe
      changes:
        - createTable:
            tableName: produtos
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: tipo_produto
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: sku
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: descricao
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: preco_venda
                  type: NUMERIC(10,2)
                  constraints:
                    nullable: false
              - column:
                  name: custo_aquisicao
                  type: NUMERIC(10,2)
                  constraints:
                    nullable: false
              - column:
                  name: quantidade
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: estoque_minimo
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: imagem_url
                  type: VARCHAR(255)
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
              - column:
                  name: deleted_at
                  type: TIMESTAMP
              - column:
                  name: ativo
                  type: BOOLEAN
                  defaultValue: true
                  constraints:
                    nullable: false
              - column:
                  name: version
                  type: BIGINT
                  defaultValue: 0

  - changeSet:
      id: 001-create-cpus-table
      author: felipe
      changes:
        - createTable:
            tableName: cpus
            columns:
              - column:
                  name: id
                  type: BIGINT
                  constraints:
                    primaryKey: true
              - column:
                  name: marca
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: modelo
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: nucleos
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: frequencia_ghz
                  type: NUMERIC(4,2)
                  constraints:
                    nullable: false
              - column:
                  name: arquitetura
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: socket
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
            foreignKeyName: fk_cpus_produtos
            referencedTableName: produtos
            referencedColumnNames: id
            baseTableSchemaName: public
            baseColumnNames: id

  - changeSet:
