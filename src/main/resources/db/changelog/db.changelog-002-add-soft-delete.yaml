databaseChangeLog:
  - changeSet:
      id: 002-add-soft-delete-indexes
      author: felipe
      changes:
        - createIndex:
            tableName: usuarios
            indexName: idx_usuarios_ativo_deleted_at
            columns:
              - column: ativo
              - column: deleted_at
        - createIndex:
            tableName: produtos
            indexName: idx_produtos_ativo_deleted_at
            columns:
              - column: ativo
              - column: deleted_at
        - createIndex:
            tableName: fornecedores
            indexName: idx_fornecedores_ativo_deleted_at
            columns:
              - column: ativo
              - column: deleted_at
        - createIndex:
            tableName: vendas
            indexName: idx_vendas_ativo_deleted_at
            columns:
              - column: ativo
              - column: deleted_at
        - createIndex:
            tableName: estoque
            indexName: idx_estoque_ativo_deleted_at
            columns:
              - column: ativo
              - column: deleted_at
