spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/hardware_store
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
  devtools:
    restart:
      enabled: true

jwt:
  secret: "dev-secret-key-super-insecure"
  expiration: 86400000

logging:
  level:
    com.lojahardware: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
